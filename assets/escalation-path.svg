<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 600" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="13">
  <rect x="0" y="0" width="780" height="600" fill="#ffffff"/>
  <defs>
    <marker id="arw" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
  </defs>

  <!-- connectors (drawn first, under the boxes) -->
  <g fill="none" stroke="#555" stroke-width="1.6">
    <!-- spine -->
    <line x1="390" y1="62"  x2="390" y2="96"  marker-end="url(#arw)"/>
    <line x1="390" y1="146" x2="390" y2="188" marker-end="url(#arw)"/>
    <line x1="390" y1="244" x2="390" y2="292" marker-end="url(#arw)"/>
    <line x1="390" y1="348" x2="390" y2="396" marker-end="url(#arw)"/>
    <line x1="390" y1="452" x2="390" y2="500" marker-end="url(#arw)"/>
    <!-- B "yes" left bypass to Tier 2 -->
    <polyline points="300,123 175,123 175,319 280,319" marker-end="url(#arw)"/>
    <!-- ok arrows to the green node on the right -->
    <polyline points="490,215 660,215 660,294" marker-end="url(#arw)"/>
    <line x1="490" y1="319" x2="560" y2="319" marker-end="url(#arw)"/>
    <polyline points="490,423 660,423 660,346" marker-end="url(#arw)"/>
  </g>

  <!-- edge labels -->
  <g fill="#333">
    <rect x="400" y="160" width="26" height="16" fill="#fff"/><text x="403" y="172">no</text>
    <rect x="92" y="206" width="118" height="16" fill="#fff"/><text x="96" y="218">yes (can't click)</text>
    <rect x="398" y="260" width="120" height="16" fill="#fff"/><text x="401" y="272">blocked / SPA shell</text>
    <rect x="398" y="366" width="64" height="16" fill="#fff"/><text x="401" y="378">blocked</text>
    <rect x="398" y="470" width="64" height="16" fill="#fff"/><text x="401" y="482">blocked</text>
    <rect x="500" y="198" width="24" height="16" fill="#fff"/><text x="503" y="210">ok</text>
    <rect x="510" y="305" width="24" height="16" fill="#fff"/><text x="513" y="317">ok</text>
    <rect x="500" y="406" width="24" height="16" fill="#fff"/><text x="503" y="418">ok</text>
  </g>

  <!-- nodes -->
  <g text-anchor="middle">
    <!-- start -->
    <rect x="310" y="22" width="160" height="40" rx="8" fill="#eef0ff" stroke="#5560a8"/>
    <text x="390" y="47" font-family="monospace">fetch(url)</text>

    <!-- decision -->
    <rect x="300" y="96" width="180" height="50" rx="8" fill="#fff3cd" stroke="#caa53d"/>
    <text x="390" y="126">dismiss_selector set?</text>

    <!-- tier 1 -->
    <rect x="270" y="188" width="240" height="56" rx="8" fill="#e7f0ff" stroke="#3f6fb5"/>
    <text x="390" y="211" font-weight="600">Tier 1 · curl_cffi</text>
    <text x="390" y="231" fill="#445">static fetch (TLS fingerprint)</text>

    <!-- tier 2 -->
    <rect x="270" y="292" width="240" height="56" rx="8" fill="#e7f0ff" stroke="#3f6fb5"/>
    <text x="390" y="315" font-weight="600">Tier 2 · Patchright</text>
    <text x="390" y="335" fill="#445">headful Chrome, JS render</text>

    <!-- tier 3 -->
    <rect x="270" y="396" width="240" height="56" rx="8" fill="#e7f0ff" stroke="#3f6fb5"/>
    <text x="390" y="419" font-weight="600">Tier 3 · nodriver</text>
    <text x="390" y="439" fill="#445">custom-CDP stealth render</text>

    <!-- success -->
    <rect x="560" y="294" width="200" height="50" rx="8" fill="#1f7a1f" stroke="#0d4d0d"/>
    <text x="660" y="316" fill="#fff" font-weight="600">render_by_type</text>
    <text x="660" y="334" fill="#dfeede">return content</text>

    <!-- failure -->
    <rect x="270" y="500" width="240" height="46" rx="8" fill="#a11111" stroke="#5e0000"/>
    <text x="390" y="528" fill="#fff" font-weight="600">raise FetchBlocked</text>
  </g>
</svg>
